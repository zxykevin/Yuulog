name: Deploy to GitHub Pages Branch

on:
  push:
    branches:
      - main
      - codex/comment-box-turnstile
  workflow_dispatch:

# 需要写入权限来推送到pages分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
        with:
          submodules: true  # 支持 Git Submodule 模式
          token: ${{ secrets.GITHUB_TOKEN }}  # 自动访问同账号下的私有仓库
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: Build site
        run: pnpm run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADQj2lpYJ7LrseHl
      
      - name: Deploy to pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: pages # 部署到pages分支
          folder: dist # Astro默认构建输出目录
          clean: true # 清理目标分支中的旧文件
