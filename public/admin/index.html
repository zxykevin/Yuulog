<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>YuuComments 管理后台</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body data-api-base="https://comments.yuulog.org">
    <main class="ya-shell">
      <header>
        <p>YuuComments</p>
        <h1>评论管理</h1>
      </header>

      <nav class="ya-tabs" data-view-tabs></nav>

      <section class="ya-toolbar">
        <form data-token-form>
          <label>
            <span>ADMIN_TOKEN</span>
            <input type="password" name="token" autocomplete="off" />
          </label>
          <button type="submit">保存</button>
        </form>

        <label>
          <span>搜索</span>
          <input type="search" data-search placeholder="昵称、内容或页面路径" />
        </label>

        <div class="ya-filters" data-filters></div>
      </section>

      <p class="ya-feedback" data-feedback></p>
      <section class="ya-grid" data-comments></section>
      <section class="ya-grid" data-reports hidden></section>
    </main>
    <script src="./admin.js" defer></script>
  </body>
</html>
